<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Escuela Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#1e3b70', /* Azul oscuro similar al de la imagen */
                            hover: '#152b53'
                        }
                    },
                    fontFamily: {
                        sans: ['Arial', 'Helvetica', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome para el ícono del estudiante -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Enlace a tu archivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Contenedor Principal: Dividido en 2 columnas en pantallas grandes -->
    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- ================= COLUMNA IZQUIERDA (Info y Foto) ================= -->
        <div class="w-full md:w-1/2 bg-brand-blue text-white flex flex-col items-center justify-center p-8 md:p-12 relative">
            
            <!-- Contenido superior (Ícono y Texto) -->
            <div class="text-center max-w-md mb-10 mt-8 md:mt-0">
                <div class="mb-4">
                    <i class="fa-solid fa-user-graduate text-5xl text-gray-200"></i>
                </div>
                <h1 class="text-3xl font-bold mb-4">Escuela Digital</h1>
                <p class="text-sm md:text-base text-gray-200 leading-relaxed">
                    Formando profesionales en tecnología, diseño y desarrollo digital. Inscríbete a nuestros programas académicos.
                </p>
            </div>

            <!-- Imagen -->
            <div class="w-full max-w-md">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                     alt="" 
                     class="rounded-xl shadow-2xl w-full object-cover h-64 md:h-80 opacity-90 hover:opacity-100 transition-opacity"
                     onerror="this.onerror=null; this.src='[https://placehold.co/800x600?text=Estudiantes](https://placehold.co/800x600?text=Estudiantes)'">
            </div>
        </div>

        <!-- ================= COLUMNA DERECHA (Formulario) ================= -->
        <div class="w-full md:w-1/2 bg-white flex flex-col items-center justify-center p-8 md:p-12">
            
            <div class="w-full max-w-sm">
                <h2 class="text-2xl font-bold text-gray-800 text-center mb-8">Formulario de Registro</h2>
                
                <form id="registroForm" class="space-y-4">
                    
                    <div>
                        <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-1">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand-blue focus:border-brand-blue transition-colors">
                    </div>

                    <div>
                        <label for="apellidos" class="block text-sm font-semibold text-gray-700 mb-1">Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand-blue focus:border-brand-blue transition-colors">
                    </div>

                    <div>
                        <label for="telefono" class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand-blue focus:border-brand-blue transition-colors">
                    </div>

                    <div>
                        <label for="correo" class="block text-sm font-semibold text-gray-700 mb-1">Correo</label>
                        <input type="email" id="correo" name="correo" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand-blue focus:border-brand-blue transition-colors">
                    </div>

                    <div>
                        <label for="carrera" class="block text-sm font-semibold text-gray-700 mb-1">Carrera</label>
                        <select id="carrera" name="carrera" required 
                                class="w-full px-3 py-2 border border-gray-300 bg-white rounded-md focus:outline-none focus:ring-1 focus:ring-brand-blue focus:border-brand-blue transition-colors">
                            <option value="Diseño Gráfico Digital">Diseño Gráfico Digital</option>
                            <option value="Desarrollo Web">Desarrollo Web</option>
                            <option value="Marketing Digital">Marketing Digital</option>
                            <option value="Animación 3D">Animación 3D</option>
                            <option value="Ciberseguridad">Ciberseguridad</option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn" 
                                class="w-full bg-brand-blue hover:bg-brand-hover text-white font-medium py-2.5 px-4 rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-blue">
                            Enviar Registro
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <!-- Contenedor de la notificación (Toast) -->
    <div id="toast">
        <i class="fa-solid fa-circle-check mr-2"></i>
        <span id="toast-message">Registro enviado con éxito</span>
    </div>

    <!-- Enlace a tu archivo JavaScript externo -->
    <script src="script.js"></script>

</body>
</html>
